<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM 및 인프라 비용 계산기</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #6c63ff;
    --accent2: #00c9a7;
    --text: #e4e4e7;
    --muted: #8b8d97;
    --danger: #ff6b6b;
    --warn: #ffd93d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 24px;
    min-height: 100vh;
  }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 28px; }

  /* Input Panel */
  .input-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .input-panel h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--accent);
  }
  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
  }
  .input-group { display: flex; flex-direction: column; gap: 6px; }
  .input-group label {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
  }
  .input-group .input-desc {
    font-size: 0.7rem;
    color: var(--muted);
    opacity: 0.7;
  }
  .input-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  .input-value {
    min-width: 80px;
    text-align: right;
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .num-input-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  input[type="number"] {
    width: 72px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.95rem;
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
    outline: none;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button {
    opacity: 1;
    height: 24px;
  }
  input[type="number"]:focus { border-color: var(--accent); }
  .num-suffix {
    font-size: 0.8rem;
    color: var(--muted);
    font-weight: 500;
    min-width: 16px;
  }
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  /* Traffic Summary */
  .traffic-summary {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    font-size: 0.85rem;
  }
  .traffic-item span:first-child { color: var(--muted); margin-right: 6px; }
  .traffic-item span:last-child { font-weight: 700; color: var(--accent2); }

  /* Results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(540px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
  }
  .result-card h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .badge {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .badge-direct { background: rgba(255,107,107,0.15); color: var(--danger); }
  .badge-rag { background: rgba(0,201,167,0.15); color: var(--accent2); }

  .cost-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .cost-table th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
  }
  .cost-table td {
    padding: 8px 0;
    border-bottom: 1px solid rgba(42,45,58,0.5);
    font-variant-numeric: tabular-nums;
  }
  .cost-table td:nth-child(2),
  .cost-table td:nth-child(3),
  .cost-table th:nth-child(2),
  .cost-table th:nth-child(3) {
    text-align: right;
  }
  .cost-table tr.total-row td {
    border-top: 2px solid var(--border);
    border-bottom: none;
    font-weight: 700;
    padding-top: 12px;
    font-size: 1rem;
  }
  .cost-table tr.total-row td:nth-child(2) { color: var(--warn); }
  .cost-table tr.total-row td:nth-child(3) { color: var(--warn); }
  .cost-table .sub-item { color: var(--muted); padding-left: 12px; font-size: 0.8rem; }

  /* Comparison Bar */
  .comparison-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
  }
  .comparison-section h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .bar-group { margin-bottom: 16px; }
  .bar-label {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .bar-container {
    height: 28px;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .bar-direct { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
  .bar-rag { background: linear-gradient(90deg, #00c9a7, #00b894); }

  /* Savings callout */
  .savings-callout {
    background: rgba(0,201,167,0.08);
    border: 1px solid rgba(0,201,167,0.2);
    border-radius: 8px;
    padding: 12px 18px;
    font-size: 0.85rem;
    color: var(--accent2);
    margin-top: 12px;
    text-align: center;
  }
  .savings-callout strong { font-size: 1.1rem; }

  /* Formula */
  .formula-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
  }
  .formula-section h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; }
  .formula-section pre {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    overflow-x: auto;
    line-height: 1.8;
  }
  .formula-section pre span { color: var(--accent2); }

  @media (max-width: 600px) {
    .results-grid { grid-template-columns: 1fr; }
    .input-grid { grid-template-columns: 1fr; }
    body { padding: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>LLM 및 인프라 비용 계산기</h1>
  <p class="subtitle">수정본 (2026-03-26) 기준 — Gemini 2.5 Flash-Lite 기본, 환율 1,450 KRW/USD</p>

  <!-- Input Panel -->
  <div class="input-panel">
    <h2>변수 설정</h2>
    <div class="input-grid">
      <div class="input-group">
        <label>일 PV (만)</label>
        <div class="input-desc">Top5: 909만 / 전체: 4,535만</div>
        <div class="input-row">
          <input type="range" id="dailyPV" min="100" max="10000" step="1" value="4535">
          <div class="num-input-wrap">
            <input type="number" id="dailyPV_num" min="100" max="10000" step="1" value="4535">
            <span class="num-suffix">만</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label>위젯 도달률 (%)</label>
        <div class="input-desc">PV 중 위젯이 실제 노출되는 비율</div>
        <div class="input-row">
          <input type="range" id="reachRate" min="10" max="100" step="1" value="50">
          <div class="num-input-wrap">
            <input type="number" id="reachRate_num" min="10" max="100" step="1" value="50">
            <span class="num-suffix">%</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label>전환율 (%)</label>
        <div class="input-desc">위젯 노출 사용자 중 질문하는 비율</div>
        <div class="input-row">
          <input type="range" id="convRate" min="0.5" max="10" step="0.1" value="2">
          <div class="num-input-wrap">
            <input type="number" id="convRate_num" min="0.5" max="10" step="0.1" value="2.0">
            <span class="num-suffix">%</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label>인당 질의 횟수 (회/일)</label>
        <div class="input-desc">한 사용자가 하루에 질문하는 횟수</div>
        <div class="input-row">
          <input type="range" id="queriesPerUser" min="1" max="10" step="1" value="3">
          <div class="num-input-wrap">
            <input type="number" id="queriesPerUser_num" min="1" max="10" step="1" value="3">
            <span class="num-suffix">회</span>
          </div>
        </div>
      </div>
      <div class="input-group">
        <label>LLM 모델</label>
        <div class="input-desc">모델별 API 단가 차이</div>
        <select id="modelSelect">
          <option value="gemini" selected>Gemini 2.5 Flash-Lite ($0.10/$0.40)</option>
          <option value="gpt4omini">GPT-4o mini ($0.15/$0.60)</option>
          <option value="solar">Solar Pro 3 ($0.15/$0.60)</option>
          <option value="clova">CLOVA HCX-DASH-002 (~2.3x)</option>
        </select>
      </div>
    </div>

    <div class="traffic-summary" id="trafficSummary"></div>
  </div>

  <!-- Results -->
  <div class="results-grid">
    <div class="result-card">
      <h3><span class="badge badge-direct">Direct</span> 직접 호출 방식</h3>
      <table class="cost-table" id="directTable"></table>
    </div>
    <div class="result-card">
      <h3><span class="badge badge-rag">RAG</span> 검색 증강 방식</h3>
      <table class="cost-table" id="ragTable"></table>
    </div>
  </div>

  <!-- Comparison -->
  <div class="comparison-section">
    <h3>Direct vs RAG 비교</h3>
    <div id="comparisonBars"></div>
    <div class="savings-callout" id="savingsCallout"></div>
  </div>

  <!-- Formula -->
  <div class="formula-section">
    <h3>계산식</h3>
    <pre id="formulaDisplay"></pre>
  </div>
</div>

<script>
const models = {
  gemini:    { name: 'Gemini 2.5 Flash-Lite', inputPrice: 0.100, outputPrice: 0.400 },
  gpt4omini: { name: 'GPT-4o mini',           inputPrice: 0.150, outputPrice: 0.600 },
  solar:     { name: 'Solar Pro 3',            inputPrice: 0.150, outputPrice: 0.600 },
  clova:     { name: 'CLOVA HCX-DASH-002',    inputPrice: 0.230, outputPrice: 0.920 },
};

const EXCHANGE_RATE = 1450;
const EMBEDDING_PRICE = 0.020; // per 1M tokens

// 캐싱 비용 = "기사당 3회 호출 × 월 발행 기사 수" → 기사 수는 PV에 비례
// $445는 전체 매체(4,535만 PV) 기준이므로, PV 비례로 스케일링
const CACHING_BASE_USD = 445;   // 전체 매체 기준 캐싱 비용
const CACHING_BASE_PV = 4535;   // 전체 매체 일 PV (만 단위)
const EMBED_INDEX_BASE_USD = 5; // 전체 매체 기준 Embedding 인덱싱 비용

// Infrastructure costs (min~max USD)
const INFRA_NO_AD  = { min: 1436, max: 2201 };
const INFRA_AD     = { min: 2341, max: 3227 };

// Token counts
const DIRECT_INPUT = 1900, DIRECT_OUTPUT = 350;
const RAG_INPUT = 600, RAG_OUTPUT = 150, RAG_EMBED_TOKENS = 100;

function fmt(n) { return n.toLocaleString('ko-KR'); }
function fmtM(n) { return Math.round(n).toLocaleString('ko-KR'); }

function calculate() {
  const dailyPV      = parseInt(document.getElementById('dailyPV').value);
  const reachRate     = parseFloat(document.getElementById('reachRate').value) / 100;
  const convRate      = parseFloat(document.getElementById('convRate').value) / 100;
  const queriesPerUser = parseInt(document.getElementById('queriesPerUser').value);
  const modelKey      = document.getElementById('modelSelect').value;
  const model         = models[modelKey];

  // Traffic
  const dailyReach = dailyPV * 10000 * reachRate;
  const dailyQueries = dailyReach * convRate * queriesPerUser;
  const monthlyQueries = dailyQueries * 30;

  // Update traffic summary
  document.getElementById('trafficSummary').innerHTML = `
    <div class="traffic-item"><span>일 위젯 도달:</span><span>${fmtM(dailyReach / 10000)}만/일</span></div>
    <div class="traffic-item"><span>일 질의 건수:</span><span>${fmtM(dailyQueries / 10000)}만 건/일</span></div>
    <div class="traffic-item"><span>월 질의 건수:</span><span>${fmtM(monthlyQueries / 10000)}만 건/월</span></div>
    <div class="traffic-item"><span>모델:</span><span>${model.name}</span></div>
  `;

  // 캐싱·인덱싱 비용: PV 비례 스케일링
  const pvRatio = dailyPV / CACHING_BASE_PV;
  const cachingUSD = CACHING_BASE_USD * pvRatio;
  const embedIndexUSD = EMBED_INDEX_BASE_USD * pvRatio;

  // --- Direct costs ---
  const directPerCall = (DIRECT_INPUT / 1e6 * model.inputPrice) + (DIRECT_OUTPUT / 1e6 * model.outputPrice);
  const directQueryUSD = monthlyQueries * directPerCall;
  const directTotalUSD = directQueryUSD + cachingUSD;
  const directLLM_KRW = directTotalUSD * EXCHANGE_RATE;

  // --- RAG costs ---
  const ragPerCall = (RAG_INPUT / 1e6 * model.inputPrice) + (RAG_OUTPUT / 1e6 * model.outputPrice) + (RAG_EMBED_TOKENS / 1e6 * EMBEDDING_PRICE);
  const ragQueryUSD = monthlyQueries * ragPerCall;
  const ragTotalUSD = ragQueryUSD + cachingUSD + embedIndexUSD;
  const ragLLM_KRW = ragTotalUSD * EXCHANGE_RATE;

  // --- Infrastructure ---
  const infraNoAd_KRW_min = INFRA_NO_AD.min * EXCHANGE_RATE;
  const infraNoAd_KRW_max = INFRA_NO_AD.max * EXCHANGE_RATE;
  const infraAd_KRW_min = INFRA_AD.min * EXCHANGE_RATE;
  const infraAd_KRW_max = INFRA_AD.max * EXCHANGE_RATE;

  // Render Direct table
  renderTable('directTable', {
    queryUSD: directQueryUSD,
    cachingUSD: cachingUSD,
    embedIndexUSD: 0,
    totalLLM_KRW: directLLM_KRW,
    infraNoAd_min: infraNoAd_KRW_min, infraNoAd_max: infraNoAd_KRW_max,
    infraAd_min: infraAd_KRW_min, infraAd_max: infraAd_KRW_max,
    perCall: directPerCall,
  });

  // Render RAG table
  renderTable('ragTable', {
    queryUSD: ragQueryUSD,
    cachingUSD: cachingUSD,
    embedIndexUSD: embedIndexUSD,
    totalLLM_KRW: ragLLM_KRW,
    infraNoAd_min: infraNoAd_KRW_min, infraNoAd_max: infraNoAd_KRW_max,
    infraAd_min: infraAd_KRW_min, infraAd_max: infraAd_KRW_max,
    perCall: ragPerCall,
  });

  // Comparison bars
  renderComparison(directLLM_KRW, ragLLM_KRW, infraNoAd_KRW_min, infraNoAd_KRW_max, infraAd_KRW_min, infraAd_KRW_max);

  // Formula
  renderFormula(dailyPV, reachRate, convRate, queriesPerUser, model, directPerCall, ragPerCall, monthlyQueries, cachingUSD, embedIndexUSD);
}

function renderTable(id, d) {
  const llm = d.totalLLM_KRW;
  const totalNoAd_min = llm + d.infraNoAd_min;
  const totalNoAd_max = llm + d.infraNoAd_max;
  const totalAd_min = llm + d.infraAd_min;
  const totalAd_max = llm + d.infraAd_max;

  document.getElementById(id).innerHTML = `
    <tr><th>항목</th><th>월 USD</th><th>월 만원 (KRW)</th></tr>
    <tr><td>직접 질의 비용</td><td>$${fmtM(d.queryUSD)}/월</td><td>${fmtM(d.queryUSD * EXCHANGE_RATE / 10000)}</td></tr>
    <tr><td>캐싱 (추천 질문)</td><td>$${fmtM(d.cachingUSD)}/월</td><td>${fmtM(d.cachingUSD * EXCHANGE_RATE / 10000)}</td></tr>
    ${d.embedIndexUSD ? `<tr><td>Embedding 인덱싱</td><td>$${d.embedIndexUSD}/월</td><td>${fmtM(d.embedIndexUSD * EXCHANGE_RATE / 10000)}</td></tr>` : ''}
    <tr><td style="font-weight:600">LLM 월 소계</td><td style="font-weight:600">$${fmtM(d.queryUSD + d.cachingUSD + d.embedIndexUSD)}</td><td style="font-weight:600; color:#ffd93d">${fmtM(llm / 10000)}</td></tr>
    <tr><td colspan="3" style="height:8px; border:none"></td></tr>
    <tr><td class="sub-item">호출당 단가</td><td colspan="2" style="text-align:right; color:var(--muted)">$${d.perCall.toFixed(6)} (≈ ${(d.perCall * EXCHANGE_RATE).toFixed(2)}원/건)</td></tr>
    <tr><td colspan="3" style="height:8px; border:none"></td></tr>
    <tr><td>인프라 (광고 제외)</td><td>$${fmt(d.infraNoAd_min)}~${fmt(d.infraNoAd_max)}/월</td><td>${fmtM(d.infraNoAd_min/10000)}~${fmtM(d.infraNoAd_max/10000)}</td></tr>
    <tr><td>인프라 (광고 포함)</td><td>$${fmt(d.infraAd_min)}~${fmt(d.infraAd_max)}/월</td><td>${fmtM(d.infraAd_min/10000)}~${fmtM(d.infraAd_max/10000)}</td></tr>
    <tr class="total-row"><td>월 총 운영 (광고 제외)</td><td></td><td>${fmtM(totalNoAd_min/10000)}~${fmtM(totalNoAd_max/10000)}만원/월</td></tr>
    <tr class="total-row"><td>월 총 운영 (광고 포함)</td><td></td><td>${fmtM(totalAd_min/10000)}~${fmtM(totalAd_max/10000)}만원/월</td></tr>
  `;
}

function renderComparison(directLLM, ragLLM, infraNoAd_min, infraNoAd_max, infraAd_min, infraAd_max) {
  const scenarios = [
    { label: '광고 제외', directTotal: directLLM + (infraNoAd_min + infraNoAd_max)/2, ragTotal: ragLLM + (infraNoAd_min + infraNoAd_max)/2 },
    { label: '광고 포함', directTotal: directLLM + (infraAd_min + infraAd_max)/2, ragTotal: ragLLM + (infraAd_min + infraAd_max)/2 },
  ];

  const maxVal = Math.max(...scenarios.map(s => Math.max(s.directTotal, s.ragTotal)));
  let html = '';

  for (const s of scenarios) {
    const dPct = (s.directTotal / maxVal * 100).toFixed(1);
    const rPct = (s.ragTotal / maxVal * 100).toFixed(1);
    html += `
      <div class="bar-group">
        <div class="bar-label"><span>${s.label} — Direct</span><span>${fmtM(s.directTotal/10000)}만원/월</span></div>
        <div class="bar-container"><div class="bar-fill bar-direct" style="width:${dPct}%"></div></div>
        <div class="bar-label" style="margin-top:6px"><span>${s.label} — RAG</span><span>${fmtM(s.ragTotal/10000)}만원/월</span></div>
        <div class="bar-container"><div class="bar-fill bar-rag" style="width:${rPct}%"></div></div>
      </div>`;
  }
  document.getElementById('comparisonBars').innerHTML = html;

  // Savings
  const savingPct = ((1 - ragLLM / directLLM) * 100).toFixed(0);
  const savingKRW = (directLLM - ragLLM) / 10000;
  document.getElementById('savingsCallout').innerHTML =
    `RAG 적용 시 LLM 비용 <strong>${savingPct}%</strong> 절감 (매월 <strong>${fmtM(savingKRW)}만원</strong> 절약)`;
}

function renderFormula(dailyPV, reachRate, convRate, qpu, model, directPerCall, ragPerCall, monthlyQueries, cachingUSD, embedIndexUSD) {
  document.getElementById('formulaDisplay').innerHTML =
`<span>월 질의 건수</span> = ${fmt(dailyPV)}만 PV × ${(reachRate*100)}% 도달률 × ${(convRate*100)}% 전환율 × ${qpu}회 × 30일
           = <span>${fmtM(monthlyQueries)}건 (${fmtM(monthlyQueries/10000)}만 건)</span>

<span>[Direct] 호출당 비용</span> = (1,900 ÷ 1M × $${model.inputPrice}) + (350 ÷ 1M × $${model.outputPrice})
                    = <span>$${directPerCall.toFixed(6)}</span> / 건

<span>[RAG] 호출당 비용</span>    = (600 ÷ 1M × $${model.inputPrice}) + (150 ÷ 1M × $${model.outputPrice}) + (100 ÷ 1M × $0.020)
                    = <span>$${ragPerCall.toFixed(6)}</span> / 건

<span>캐싱 비용</span> = $445 × (${fmt(dailyPV)}만 ÷ 4,535만) = <span>$${fmtM(cachingUSD)}/월</span>  (기사 수에 비례)
<span>인프라</span>   = 트래픽 무관 고정비. 광고 제외 $1,436~2,201 / 광고 포함 $2,341~3,227
<span>환율</span>     = 1,450 KRW/USD`;
}

// Sync slider ↔ number input
function bindPair(id) {
  const range = document.getElementById(id);
  const num = document.getElementById(id + '_num');
  range.addEventListener('input', () => {
    num.value = range.value;
    calculate();
  });
  num.addEventListener('input', () => {
    let v = parseFloat(num.value);
    const min = parseFloat(range.min), max = parseFloat(range.max);
    if (!isNaN(v)) {
      if (v < min) v = min;
      if (v > max) v = max;
      range.value = v;
    }
    calculate();
  });
}

bindPair('dailyPV');
bindPair('reachRate');
bindPair('convRate');
bindPair('queriesPerUser');
document.getElementById('modelSelect').addEventListener('change', calculate);

calculate();
</script>
